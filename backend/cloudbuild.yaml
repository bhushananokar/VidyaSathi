steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/vidhyasathi/vidyasathi-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/vidhyasathi/vidyasathi-backend:latest'
      - '.'
    dir: 'vidyasathi/backend'

images:
  - 'gcr.io/vidhyasathi/vidyasathi-backend:$COMMIT_SHA'
  - 'gcr.io/vidhyasathi/vidyasathi-backend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
